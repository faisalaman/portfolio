<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a18" />
    <title>404 — Page not found · Faisal Aman</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a0a18;
        --text: #f5f5fa;
        --muted: #8a8aa3;
        --primary: #a78bfa;
        --accent: #22d3ee;
        --border: rgba(255,255,255,0.10);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        background: radial-gradient(circle at 50% 30%, rgba(167,139,250,0.25), transparent 60%), var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        display: grid;
        place-items: center;
        padding: 24px;
        overflow: hidden;
      }
      .wrap { text-align: center; max-width: 560px; }
      .code {
        font-size: clamp(80px, 20vw, 180px);
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(120deg, var(--primary), var(--accent), #f472b6);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        letter-spacing: -4px;
      }
      h1 { margin-top: 12px; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
      p { margin-top: 12px; color: var(--muted); font-size: 15px; line-height: 1.6; }
      .cta { margin-top: 28px; display: inline-flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
      .btn {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 12px 20px;
        border-radius: 12px;
        font-weight: 600; font-size: 14px;
        text-decoration: none; color: white;
        background: var(--primary);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(167,139,250,0.4); }
      .btn.ghost {
        background: transparent; color: var(--text);
        border: 1px solid var(--border);
      }
      .btn.ghost:hover { background: rgba(255,255,255,0.04); }
      .dots {
        position: fixed; inset: 0;
        background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.08) 1px, transparent 0);
        background-size: 28px 28px;
        pointer-events: none;
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div class="dots"></div>
    <div class="wrap">
      <div class="code">404</div>
      <h1>This page wandered off.</h1>
      <p>The link you followed doesn't exist. Head back to the homepage or get in touch — everything else is still where you left it.</p>
      <div class="cta">
        <a class="btn" href="/">← Back to home</a>
        <a class="btn ghost" href="mailto:askfaisal@outlook.com">Email me</a>
      </div>
    </div>
  </body>
</html>
